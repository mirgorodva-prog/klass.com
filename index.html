<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підрахунок цифр</title>
    <link rel="stylesheet" href="klass.css">
    <script src="klass.js"></script>
</head>
<body>

    <div class="card">
        <h2>Скільки цифр у числі?</h2>
        
        <div class="input-field">
            <label for="userNum">Введіть ціле число</label>
            <input type="number" id="userNum" placeholder="Наприклад: 12345">
        </div>

        <button id="btnCount">Порахувати цифри</button>

        <div class="result-box">
            <p>Кількість цифр: <span id="resCount">---</span></p>
            <div id="comment" style="font-size: 0.9rem; color: #7f8c8d; margin-top: 10px;"></div>
        </div>
    </div>

    
</body>
</html>
